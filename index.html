<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bang Creations HR Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#FAA61A;--ord:#d4880f;--olt:#FEF0D3;
  --w:#fff;--ow:#f7f7f5;--g50:#f2f2f0;--g100:#e6e6e2;--g200:#d0d0ca;--g400:#9b9b94;--g600:#5e5e58;--g900:#1a1a18;
  --gbg:#edfaf3;--gtx:#1a7a45;--rbg:#fdecea;--rtx:#c0392b;--bbg:#eaf2ff;--btx:#1a5fb4;
  --rsm:6px;--rmd:10px;--rlg:14px;
  --ss:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sm:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --f:'DM Sans','Helvetica Neue',Arial,sans-serif
}
html,body{font-family:var(--f);font-size:14px;background:var(--ow);color:var(--g900);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
.screen{display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:18px;background:var(--ow);text-align:center;padding:24px}
.screen.active{display:flex}
.ssub{font-size:14px;color:var(--g400)}
.sinbtn{font-family:var(--f);background:var(--or);color:var(--w);border:none;border-radius:var(--rmd);padding:12px 32px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 2px 10px rgba(250,166,26,.3);transition:background .15s;margin-top:8px}
.sinbtn:hover{background:var(--ord)}
.spinner{width:36px;height:36px;border:3px solid var(--g100);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:13px;color:var(--g400)}
.ebox{background:var(--rbg);color:var(--rtx);border-radius:var(--rmd);padding:14px 20px;font-size:13px;max-width:420px;line-height:1.6}
.rbtn{font-family:var(--f);background:transparent;border:1.5px solid var(--or);color:var(--or);border-radius:var(--rmd);padding:8px 22px;font-size:13px;font-weight:500;cursor:pointer}
.rbtn:hover{background:var(--or);color:var(--w)}
#portal{display:none;flex-direction:column;min-height:100vh}
#portal.active{display:flex}
.hdr{background:var(--w);border-bottom:2.5px solid var(--or);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--ss)}
.hdr-logo{height:32px;display:block}
.hdr-logo-signin{height:36px;margin-bottom:4px}
.hdiv{width:1px;height:22px;background:var(--g200);margin:0 12px}
.psub{font-size:12px;color:var(--g400)}
.hright{display:flex;align-items:center;gap:14px}
.upill{display:flex;align-items:center;gap:8px;background:var(--g50);border-radius:20px;padding:5px 12px 5px 6px;font-size:12px;color:var(--g600);font-weight:500}
.uav{width:24px;height:24px;border-radius:50%;background:var(--olt);color:#7a4f00;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.sobtn{font-family:var(--f);font-size:11px;font-weight:500;padding:5px 12px;border:1px solid var(--g200);background:transparent;border-radius:var(--rsm);cursor:pointer;color:var(--g600)}
.sobtn:hover{border-color:var(--g400);color:var(--g900)}
.tabs{background:var(--w);border-bottom:1px solid var(--g100);display:flex;padding:0 24px}
.tab{padding:13px 20px;font-family:var(--f);font-size:13px;font-weight:500;border:none;background:transparent;cursor:pointer;color:var(--g400);border-bottom:3px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.tab:hover{color:var(--or)}
.tab.active{color:var(--or);border-bottom-color:var(--or)}
.ca{flex:1}
.panel{display:none;padding:24px;max-width:960px;margin:0 auto;width:100%}
.panel.active{display:block}
.scards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.sc{background:var(--w);border-radius:var(--rlg);padding:16px 18px;text-align:center;box-shadow:var(--ss);border:1px solid var(--g100)}
.sc .n{font-size:30px;font-weight:600;color:var(--or);line-height:1;letter-spacing:-1px}
.sc .l{font-size:11px;font-weight:500;color:var(--g400);margin-top:5px;text-transform:uppercase;letter-spacing:.06em}
.stitle{font-size:11px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.tc{background:var(--w);border:1px solid var(--g100);border-radius:var(--rlg);padding:16px 18px;margin-bottom:10px;box-shadow:var(--ss);transition:box-shadow .15s,border-color .15s}
.tc:hover{box-shadow:var(--sm);border-color:var(--g200)}
.tc.done{opacity:.65}
.ttop{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.tn{font-size:15px;font-weight:500;color:var(--g900);line-height:1.3}
.tn.struck{text-decoration:line-through;color:var(--g400)}
.tmeta{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px;align-items:center}
.tdesc{font-size:12.5px;color:var(--g600);margin-top:6px;line-height:1.5}
.tlinks{margin-top:8px;font-size:12px;display:flex;flex-wrap:wrap;gap:8px}
.tlinks a{color:var(--or);text-decoration:none;font-weight:500}
.tlinks a:hover{text-decoration:underline}
.badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;white-space:nowrap}
.bor{background:var(--olt);color:#7a4f00}
.bgr{background:var(--gbg);color:var(--gtx)}
.bre{background:var(--rbg);color:var(--rtx)}
.bgy{background:var(--g50);color:var(--g600)}
.bbl{background:var(--bbg);color:var(--btx)}
.cbtn{font-family:var(--f);font-size:12px;font-weight:500;padding:7px 15px;border:1.5px solid var(--or);background:transparent;color:var(--or);border-radius:var(--rmd);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .15s,color .15s}
.cbtn:hover{background:var(--or);color:var(--w)}
.cbtn.dn{border-color:var(--g200);color:var(--g400);background:var(--g50)}
.cbtn:disabled{opacity:.5;cursor:not-allowed}
.avrow{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.av{width:28px;height:28px;border-radius:50%;font-size:10px;font-weight:600;display:inline-flex;align-items:center;justify-content:center}
.avp{background:var(--olt);color:#7a4f00}
.avd{background:var(--gbg);color:var(--gtx)}
.avo{background:var(--rbg);color:var(--rtx)}
.fcard{background:var(--w);border:1px solid var(--g100);border-radius:var(--rlg);padding:20px 22px;margin-bottom:22px;box-shadow:var(--ss)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fr{margin-bottom:15px}
.fr label{font-size:12px;font-weight:500;color:var(--g600);display:block;margin-bottom:6px}
.fr input[type=text],.fr input[type=date],.fr textarea,.fr select{width:100%;font-family:var(--f);font-size:13.5px;padding:9px 11px;border-radius:var(--rsm);border:1px solid var(--g200);background:var(--w);color:var(--g900);outline:none;transition:border-color .15s,box-shadow .15s}
.fr input:focus,.fr textarea:focus,.fr select:focus{border-color:var(--or);box-shadow:0 0 0 3px rgba(250,166,26,.12)}
.fr textarea{min-height:74px;resize:vertical;line-height:1.5}
/* Custom assignee checkbox list */
.assignee-list{border:1px solid var(--g200);border-radius:var(--rsm);overflow:hidden;max-height:220px;overflow-y:auto}
.assignee-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--g100);user-select:none}
.assignee-item:last-child{border-bottom:none}
.assignee-item:hover{background:var(--g50)}
.assignee-item.checked{background:var(--olt)}
.assignee-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--or);cursor:pointer;flex-shrink:0}
.assignee-item .aname{font-size:13.5px;color:var(--g900);line-height:1}
.assignee-item .aemail{font-size:11px;color:var(--g400);margin-top:2px}
.assignee-actions{display:flex;gap:8px;margin-top:6px}
.assignee-actions button{font-family:var(--f);font-size:11px;font-weight:500;padding:3px 10px;border:1px solid var(--g200);background:transparent;border-radius:var(--rsm);cursor:pointer;color:var(--g600)}
.assignee-actions button:hover{border-color:var(--or);color:var(--or)}
.select-hint{font-size:11px;color:var(--g400);margin-top:4px}
.sbtn{font-family:var(--f);background:var(--or);color:var(--w);border:none;border-radius:var(--rmd);padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(250,166,26,.25);transition:background .15s}
.sbtn:hover{background:var(--ord)}
.sbtn:disabled{opacity:.5;cursor:not-allowed}
.tblcard{background:var(--w);border:1px solid var(--g100);border-radius:var(--rlg);overflow:hidden;box-shadow:var(--ss);margin-bottom:22px}
.mtbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.mtbl th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--g400);padding:11px 14px;background:var(--g50);border-bottom:1px solid var(--g100)}
.mtbl td{padding:10px 14px;border-bottom:1px solid var(--g100);color:var(--g900);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mtbl tr:last-child td{border-bottom:none}
.mtbl tr:hover td{background:var(--g50)}
.dbtn{font-family:var(--f);font-size:11px;font-weight:500;padding:4px 11px;border:1px solid var(--g200);background:transparent;border-radius:var(--rsm);cursor:pointer;color:var(--rtx)}
.dbtn:hover{background:var(--rbg);border-color:var(--rtx)}
.dbtn:disabled{opacity:.4;cursor:not-allowed}
.toast{background:var(--g900);color:var(--w);font-size:13px;font-weight:500;padding:11px 18px;border-radius:var(--rmd);margin-bottom:14px;display:none;align-items:center;gap:8px;box-shadow:var(--sm)}
.toast.show{display:flex}
.toast.err{background:var(--rtx)}
.empty{text-align:center;padding:36px;color:var(--g400);font-size:14px}
.isp{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@media(max-width:640px){.scards{grid-template-columns:repeat(2,1fr)}.fg2{grid-template-columns:1fr}.panel{padding:16px}}
</style>
</head>
<body>

<!-- Loading screen -->
<div class="screen active" id="s-loading">
  <div class="spinner"></div>
  <div class="ltxt" id="ltxt">Loading…</div>
</div>

<!-- Sign-in screen -->
<div class="screen" id="s-signin">
  <img src="https://www.bangcreations.co.uk/wp-content/themes/bang/img/bang-01.svg" alt="Bang Creations" class="hdr-logo-signin" onerror="this.style.display='none'">
  <div class="ssub">Sign in with your Microsoft 365 account to access the HR portal</div>
  <button class="sinbtn" id="sinbtn">Sign in with Microsoft</button>
  <div id="sin-err" class="ebox" style="display:none"></div>
</div>

<!-- Error screen -->
<div class="screen" id="s-error">
  <img src="https://www.bangcreations.co.uk/wp-content/themes/bang/img/bang-01.svg" alt="Bang Creations" class="hdr-logo-signin" onerror="this.style.display='none'">
  <div class="ebox" id="errmsg">Something went wrong.</div>
  <button class="rbtn" onclick="location.reload()">Try again</button>
</div>

<!-- Main portal -->
<div id="portal">
  <header class="hdr">
    <div style="display:flex;align-items:center">
      <img src="https://www.bangcreations.co.uk/wp-content/themes/bang/img/bang-01.svg" alt="Bang Creations" class="hdr-logo" onerror="this.style.display='none'">
      <div class="hdiv"></div>
      <div class="psub">HR Training Portal</div>
    </div>
    <div class="hright">
      <div class="upill"><div class="uav" id="uav"></div><span id="uname"></span></div>
      <button class="sobtn" id="sobtn">Sign out</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" onclick="switchTab('my',event)">My tasks</button>
    <button class="tab" onclick="switchTab('hr',event)">HR manager</button>
  </nav>

  <div class="ca">

    <!-- MY TASKS -->
    <div class="panel active" id="panel-my">
      <div class="scards" id="my-stats"></div>
      <div class="stitle">Assigned to me</div>
      <div id="my-list"></div>
    </div>

    <!-- HR MANAGER -->
    <div class="panel" id="panel-hr">
      <div id="toast" class="toast"><span id="toasttxt"></span></div>
      <div class="stitle">Assign new training task</div>
      <div class="fcard">
        <div class="fr"><label>Task title</label><input type="text" id="f-title" placeholder="e.g. Fire Safety Awareness"></div>
        <div class="fr"><label>Description</label><textarea id="f-desc" placeholder="Brief description of the task or training objective…"></textarea></div>
        <div class="fg2">
          <div class="fr"><label>Due date</label><input type="date" id="f-due"></div>
          <div class="fr"><label>Category</label>
            <select id="f-cat">
              <option>Health &amp; Safety</option>
              <option>Compliance</option>
              <option>Professional Development</option>
              <option>Onboarding</option>
              <option>Technical Skills</option>
              <option>Leadership</option>
              <option>Other</option>
            </select>
          </div>
        </div>
        <div class="fr">
          <label>Assign to</label>
          <div class="assignee-list" id="assignee-list">
            <div class="assignee-item" style="color:var(--g400);font-size:13px;justify-content:center;cursor:default">
              <span class="isp"></span> Loading users…
            </div>
          </div>
          <div class="assignee-actions">
            <button onclick="selectAllAssignees()">Select all</button>
            <button onclick="clearAllAssignees()">Clear all</button>
          </div>
          <div class="select-hint" id="user-load-hint"></div>
        </div>
        <div class="fr"><label>Related links <span style="font-weight:400;color:var(--g400)">(comma-separated URLs)</span></label><input type="text" id="f-links" placeholder="https://…"></div>
        <button class="sbtn" id="addbtn" onclick="addTask()">Assign task</button>
      </div>

      <div class="stitle">All tasks — manage</div>
      <div class="tblcard">
        <table class="mtbl">
          <thead><tr>
            <th style="width:28%">Task</th>
            <th style="width:20%">Assigned to</th>
            <th style="width:12%">Due</th>
            <th style="width:16%">Category</th>
            <th style="width:13%">Progress</th>
            <th style="width:11%">Action</th>
          </tr></thead>
          <tbody id="mtbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
// ── Config ───────────────────────────────────────────────
var CFG = {
  clientId:  'f023a1d2-c805-4fd1-80dc-79f4c7c75a50',
  tenantId:  'a3f79504-fd00-417d-9194-0559070d1f8e',
  siteUrl:   'https://bangcreations.sharepoint.com/sites/BANGTEAM',
  tenant:    'bangcreations',
  listTasks: 'HR_Tasks',
  listComps: 'HR_Completions'
};

// Scopes — includes User.ReadBasic.All for fetching org users
var SCOPES = [
  'https://graph.microsoft.com/Sites.ReadWrite.All',
  'https://graph.microsoft.com/User.ReadBasic.All'
];

// ── State ────────────────────────────────────────────────
var gMsal   = null;
var gUser   = null;  // { name, email, ini }
var gSiteId = null;
var gTLId   = null;
var gCLId   = null;
var gTasks  = [];
var gComps  = [];
var gUsers  = [];    // [{name, email}] — fetched from Graph

// ── Screen helpers ───────────────────────────────────────
function showScreen(id) {
  var ids = ['s-loading','s-signin','s-error','portal'];
  for (var i=0; i<ids.length; i++) {
    var el = document.getElementById(ids[i]);
    if (!el) continue;
    el.classList.remove('active');
    if (ids[i]==='portal') el.style.display='none';
  }
  var t = document.getElementById(id);
  if (!t) return;
  if (id==='portal') { t.style.display='flex'; t.classList.add('active'); }
  else t.classList.add('active');
}
function setLoading(msg) { document.getElementById('ltxt').textContent=msg; showScreen('s-loading'); }
function showFatalError(msg) { document.getElementById('errmsg').textContent=msg; showScreen('s-error'); }

// ── Auth ─────────────────────────────────────────────────
function doSignIn() {
  document.getElementById('sin-err').style.display='none';
  gMsal.loginRedirect({ scopes: SCOPES }).catch(function(e) {
    var el=document.getElementById('sin-err');
    el.textContent='Sign-in failed: '+(e.message||String(e));
    el.style.display='block';
  });
}
function doSignOut() { gMsal.logoutRedirect(); }

function getToken() {
  var acct = gMsal.getActiveAccount() || gMsal.getAllAccounts()[0];
  if (!acct) return Promise.reject(new Error('Not signed in'));
  return gMsal.acquireTokenSilent({ scopes:SCOPES, account:acct }).then(function(r){ return r.accessToken; });
}

// ── Graph helpers ────────────────────────────────────────
function gGet(url) {
  return getToken().then(function(tok) {
    return fetch('https://graph.microsoft.com/v1.0'+url, {
      headers:{ Authorization:'Bearer '+tok, Accept:'application/json' }
    }).then(function(r) {
      if (!r.ok) return r.text().then(function(t){ throw new Error('GET '+url+' => '+r.status+' '+t); });
      return r.json();
    });
  });
}
function gPost(url, body) {
  return getToken().then(function(tok) {
    return fetch('https://graph.microsoft.com/v1.0'+url, {
      method:'POST',
      headers:{ Authorization:'Bearer '+tok, 'Content-Type':'application/json' },
      body:JSON.stringify(body)
    }).then(function(r) {
      if (!r.ok) return r.text().then(function(t){ throw new Error('POST '+url+' => '+r.status+' '+t); });
      return r.json();
    });
  });
}
function gDel(url) {
  return getToken().then(function(tok) {
    return fetch('https://graph.microsoft.com/v1.0'+url, {
      method:'DELETE', headers:{ Authorization:'Bearer '+tok }
    }).then(function(r){ if (!r.ok) throw new Error('DELETE '+url+' => '+r.status); });
  });
}

// ── Fetch org users from Graph ───────────────────────────
function fetchUsers() {
  // Fetch all enabled member accounts — excludes guests and disabled accounts
  return gGet('/users?$select=displayName,mail,userPrincipalName&$filter=accountEnabled eq true&$top=100').then(function(d) {
    gUsers = d.value
      .filter(function(u){ return u.displayName && (u.mail || u.userPrincipalName); })
      .map(function(u){
        return {
          name:  u.displayName,
          email: (u.mail || u.userPrincipalName).toLowerCase()
        };
      })
      .sort(function(a,b){ return a.name.localeCompare(b.name); });
    populateUserDropdown();
  });
}

function populateUserDropdown() {
  var list = document.getElementById('assignee-list');
  if (!gUsers.length) {
    list.innerHTML = '<div class="assignee-item" style="color:var(--g400);font-size:13px;justify-content:center;cursor:default">No users found</div>';
    return;
  }
  list.innerHTML = gUsers.map(function(u) {
    var safeEmail = u.email.replace(/"/g,'&quot;');
    var safeName  = u.name.replace(/</g,'&lt;');
    return '<label class="assignee-item" id="ai-'+safeEmail+'">'
      + '<input type="checkbox" value="'+safeEmail+'" onchange="onAssigneeChange(this)">'
      + '<div><div class="aname">'+safeName+'</div><div class="aemail">'+safeEmail+'</div></div>'
      + '</label>';
  }).join('');
  var hint = document.getElementById('user-load-hint');
  if (hint) hint.textContent = gUsers.length + ' users available';
}

function onAssigneeChange(cb) {
  var item = cb.closest('.assignee-item');
  if (cb.checked) item.classList.add('checked');
  else item.classList.remove('checked');
}

function selectAllAssignees() {
  var cbs = document.querySelectorAll('#assignee-list input[type=checkbox]');
  for (var i=0; i<cbs.length; i++) {
    cbs[i].checked = true;
    cbs[i].closest('.assignee-item').classList.add('checked');
  }
}

function clearAllAssignees() {
  var cbs = document.querySelectorAll('#assignee-list input[type=checkbox]');
  for (var i=0; i<cbs.length; i++) {
    cbs[i].checked = false;
    cbs[i].closest('.assignee-item').classList.remove('checked');
  }
}

// ── SharePoint helpers ───────────────────────────────────
function tryParse(s, def) { try{ return JSON.parse(s||''); }catch(e){ return def; } }

function getSiteId() {
  var host = CFG.tenant+'.sharepoint.com';
  var path = CFG.siteUrl.replace('https://'+host,'');
  return gGet('/sites/'+host+':'+path).then(function(d){ return d.id; });
}

function getListId(sid, name) {
  return gGet('/sites/'+sid+'/lists?$filter=displayName eq \''+name+'\'').then(function(d) {
    if (d.value && d.value.length > 0) return d.value[0].id;
    throw new Error('SharePoint list "'+name+'" not found. Please create it manually — see setup instructions.');
  });
}

function fetchTasks() {
  return gGet('/sites/'+gSiteId+'/lists/'+gTLId+'/items?$expand=fields&$top=500').then(function(d) {
    gTasks = d.value.map(function(i){
      return {
        id:        i.id,
        title:     i.fields.TaskTitle || i.fields.Title || '',
        desc:      i.fields.Description || '',
        due:       (i.fields.DueDate || '').split('T')[0],
        cat:       i.fields.Category || '',
        // Assignees stored as JSON array of email addresses
        assignees: tryParse(i.fields.Assignees, []),
        links:     tryParse(i.fields.Links, [])
      };
    });
  });
}

function fetchComps() {
  return gGet('/sites/'+gSiteId+'/lists/'+gCLId+'/items?$expand=fields&$top=1000').then(function(d) {
    gComps = d.value.map(function(i){
      return {
        id:       i.id,
        taskId:   i.fields.TaskId || '',
        // AssigneeName stores the email address for reliable matching
        assignee: (i.fields.AssigneeName || '').toLowerCase()
      };
    });
  });
}

// ── Bootstrap ────────────────────────────────────────────
function bootstrap() {
  setLoading('Connecting to Microsoft 365…');
  var acct = gMsal.getActiveAccount() || gMsal.getAllAccounts()[0];
  if (!acct) { showScreen('s-signin'); return; }

  // Use email for matching — more reliable than display name
  var email = (acct.username || '').toLowerCase();
  var name  = acct.name || acct.username;
  gUser = {
    name:  name,
    email: email,
    ini:   name.split(' ').map(function(p){return p[0];}).join('').slice(0,2).toUpperCase()
  };

  setLoading('Connecting to SharePoint…');
  getSiteId()
  .then(function(id) {
    gSiteId = id;
    setLoading('Loading lists…');
    return getListId(id, CFG.listTasks);
  })
  .then(function(id) {
    gTLId = id;
    return getListId(gSiteId, CFG.listComps);
  })
  .then(function(id) {
    gCLId = id;
    setLoading('Loading users…');
    return fetchUsers();
  })
  .then(function() {
    setLoading('Loading tasks…');
    return fetchTasks();
  })
  .then(function() {
    return fetchComps();
  })
  .then(function() {
    document.getElementById('uname').textContent = gUser.name;
    document.getElementById('uav').textContent   = gUser.ini;
    document.getElementById('sobtn').onclick      = doSignOut;
    showScreen('portal');
    renderMy();
    renderManage();
  })
  .catch(function(e) {
    showFatalError(e.message || String(e));
    console.error(e);
  });
}

// ── Utilities ────────────────────────────────────────────
function today() { return new Date().toISOString().split('T')[0]; }
function fmt(d)  { if(!d) return '—'; var p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function ini(n)  { return n.split(' ').map(function(p){return p[0];}).join(''); }

// Look up display name by email
function nameByEmail(email) {
  var e = email.toLowerCase();
  for (var i=0; i<gUsers.length; i++) {
    if (gUsers[i].email === e) return gUsers[i].name;
  }
  return email; // fallback to email if not found
}

// Match by email (stored in AssigneeName field)
function isComp(tid, email) {
  var e = email.toLowerCase();
  return gComps.some(function(c){ return c.taskId===String(tid) && c.assignee===e; });
}
function isOver(t, email) { return t.due < today() && !isComp(t.id, email); }

function dueBadge(t, email) {
  if (isComp(t.id,email))  return '<span class="badge bgr">&#10003; Complete</span>';
  if (t.due < today())     return '<span class="badge bre">Overdue</span>';
  var d = Math.ceil((new Date(t.due)-new Date(today()))/86400000);
  if (d<=7)                return '<span class="badge bor">Due soon</span>';
  return '<span class="badge bgy">Upcoming</span>';
}
function sc(n,l){ return '<div class="sc"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'; }

// ── Render: My Tasks ─────────────────────────────────────
function renderMy() {
  // Match signed-in user by email address
  var email = gUser ? gUser.email : '';
  var mt = gTasks.filter(function(t){
    return t.assignees.some(function(a){ return a.toLowerCase()===email; });
  });
  var dn = mt.filter(function(t){ return isComp(t.id, email); }).length;
  var ov = mt.filter(function(t){ return isOver(t, email); }).length;

  document.getElementById('my-stats').innerHTML =
    sc(mt.length,'Assigned')+sc(dn,'Complete')+sc(mt.length-dn,'Pending')+sc(ov,'Overdue');

  if (!mt.length) {
    document.getElementById('my-list').innerHTML='<div class="empty">No tasks assigned to you yet.</div>';
    return;
  }

  document.getElementById('my-list').innerHTML = mt.map(function(t) {
    var d  = isComp(t.id, email);
    var lk = t.links.length
      ? '<div class="tlinks">'+t.links.map(function(l){
          return '<a href="'+l+'" target="_blank">&#128279; '+l.replace(/^https?:\/\//,'').split('/')[0]+'</a>';
        }).join('')+'</div>'
      : '';
    var safeEmail = email.replace(/'/g,"\\'");
    return '<div class="tc'+(d?' done':'')+'">'+
      '<div class="ttop">'+
        '<div style="flex:1;min-width:0">'+
          '<div class="tn'+(d?' struck':'')+'">'+t.title+'</div>'+
          '<div class="tmeta">'+
            dueBadge(t,email)+
            '<span class="badge bbl">'+t.cat+'</span>'+
            '<span style="font-size:11.5px;color:var(--g400)">Due '+fmt(t.due)+'</span>'+
          '</div>'+
          '<div class="tdesc">'+t.desc+'</div>'+
          lk+
        '</div>'+
        '<button class="cbtn'+(d?' dn':'')+'" id="cb-'+t.id+'" onclick="toggleComp(\''+t.id+'\',\''+safeEmail+'\')">'+(d?'&#10003; Done':'Mark done')+'</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

// ── Render: Manage table ─────────────────────────────────
function renderManage() {
  var tb = document.getElementById('mtbody');
  if (!gTasks.length) {
    tb.innerHTML='<tr><td colspan="6" class="empty">No tasks yet.</td></tr>';
    return;
  }
  tb.innerHTML = gTasks.map(function(t) {
    var dc  = t.assignees.filter(function(e){ return isComp(t.id,e); }).length;
    var avs = t.assignees.map(function(e){
      var n  = nameByEmail(e);
      var cl = isComp(t.id,e)?'avd':isOver(t,e)?'avo':'avp';
      return '<span class="av '+cl+'" style="width:24px;height:24px;font-size:9px" title="'+n+'">'+ini(n)+'</span>';
    }).join('');
    return '<tr>'+
      '<td title="'+t.title+'" style="font-weight:500">'+t.title+'</td>'+
      '<td><div style="display:flex;flex-wrap:wrap;gap:3px">'+avs+'</div></td>'+
      '<td>'+fmt(t.due)+'</td>'+
      '<td><span class="badge bbl" style="font-size:10px">'+t.cat+'</span></td>'+
      '<td style="color:var(--g600)">'+dc+'/'+t.assignees.length+' done</td>'+
      '<td><button class="dbtn" id="db-'+t.id+'" onclick="delTask(\''+t.id+'\')">Delete</button></td>'+
    '</tr>';
  }).join('');
}

// ── Actions ──────────────────────────────────────────────
function toggleComp(tid, email) {
  var btn = document.getElementById('cb-'+tid);
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="isp"></span>'; }
  var ex = null;
  for (var i=0; i<gComps.length; i++) {
    if (gComps[i].taskId===String(tid) && gComps[i].assignee===email.toLowerCase()) { ex=gComps[i]; break; }
  }
  var p = ex
    ? gDel('/sites/'+gSiteId+'/lists/'+gCLId+'/items/'+ex.id).then(function(){
        gComps = gComps.filter(function(c){ return c.id!==ex.id; });
      })
    : gPost('/sites/'+gSiteId+'/lists/'+gCLId+'/items', {
        fields:{ TaskId:String(tid), AssigneeName:email.toLowerCase(), CompletedOn:new Date().toISOString() }
      }).then(function(r){ gComps.push({ id:r.id, taskId:String(tid), assignee:email.toLowerCase() }); });

  p.then(function(){ renderMy(); renderManage(); })
   .catch(function(e){ showToast('Error: '+e.message, true); if(btn){btn.disabled=false;btn.textContent='Mark done';} });
}

function addTask() {
  var title = document.getElementById('f-title').value.trim();
  var desc  = document.getElementById('f-desc').value.trim();
  var due   = document.getElementById('f-due').value;
  var cat   = document.getElementById('f-cat').value;
  var raw   = document.getElementById('f-links').value.trim();
  var links = raw ? raw.split(',').map(function(l){return l.trim();}).filter(Boolean) : [];

  // Get selected emails from checkbox list
  var cbs  = document.querySelectorAll('#assignee-list input[type=checkbox]:checked');
  var asgn = [];
  for (var i=0; i<cbs.length; i++) asgn.push(cbs[i].value);

  if (!title)        { alert('Please enter a task title.'); return; }
  if (!due)          { alert('Please select a due date.'); return; }
  if (!asgn.length)  { alert('Please assign to at least one person.'); return; }

  var btn = document.getElementById('addbtn');
  btn.disabled=true; btn.innerHTML='<span class="isp"></span> Saving…';

  gPost('/sites/'+gSiteId+'/lists/'+gTLId+'/items', {
    fields:{
      TaskTitle:   title,
      Description: desc,
      DueDate:     due,
      Category:    cat,
      Assignees:   JSON.stringify(asgn),  // stored as JSON array of emails
      Links:       JSON.stringify(links)
    }
  }).then(function(r) {
    gTasks.push({ id:r.id, title:title, desc:desc, due:due, cat:cat, assignees:asgn, links:links });
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value  = '';
    document.getElementById('f-due').value   = '';
    document.getElementById('f-links').value = '';
    clearAllAssignees();
    renderMy(); renderManage();
    showToast('Task assigned successfully!');
  }).catch(function(e){ showToast('Error: '+e.message, true); })
  .then(function(){ btn.disabled=false; btn.textContent='Assign task'; });
}

function delTask(tid) {
  if (!confirm('Delete this task and all completion records?')) return;
  var btn = document.getElementById('db-'+tid);
  if (btn) btn.disabled=true;
  var related = gComps.filter(function(c){ return c.taskId===String(tid); });
  gDel('/sites/'+gSiteId+'/lists/'+gTLId+'/items/'+tid)
  .then(function(){
    return Promise.all(related.map(function(c){
      return gDel('/sites/'+gSiteId+'/lists/'+gCLId+'/items/'+c.id);
    }));
  }).then(function(){
    gTasks = gTasks.filter(function(t){ return t.id!==tid; });
    gComps = gComps.filter(function(c){ return c.taskId!==String(tid); });
    renderMy(); renderManage();
    showToast('Task deleted.');
  }).catch(function(e){ showToast('Error: '+e.message,true); if(btn)btn.disabled=false; });
}

function showToast(msg, isErr) {
  var el=document.getElementById('toast'), tx=document.getElementById('toasttxt');
  tx.textContent=msg; el.classList.toggle('err',!!isErr); el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 4000);
}

function switchTab(name, e) {
  var tabs=document.querySelectorAll('.tab');
  for (var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
  var panels=document.querySelectorAll('.panel');
  for (var i=0;i<panels.length;i++) panels[i].classList.remove('active');
  e.currentTarget.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

// ── STARTUP ──────────────────────────────────────────────
setLoading('Loading…');

var msalScript = document.createElement('script');
msalScript.src = './msal-browser.min.js';

msalScript.onload = function() {
  var msalCfg = {
    auth: {
      clientId:    CFG.clientId,
      authority:   'https://login.microsoftonline.com/'+CFG.tenantId,
      redirectUri: window.location.origin+window.location.pathname
    },
    cache:{ cacheLocation:'sessionStorage', storeAuthStateInCookie:false }
  };
  gMsal = new msal.PublicClientApplication(msalCfg);

  gMsal.initialize().then(function() {
    document.getElementById('sinbtn').onclick = doSignIn;
    return gMsal.handleRedirectPromise();
  }).then(function(res) {
    if (res && res.account) {
      gMsal.setActiveAccount(res.account);
      bootstrap();
      return;
    }
    var accts = gMsal.getAllAccounts();
    if (accts.length > 0) {
      gMsal.setActiveAccount(accts[0]);
      bootstrap();
    } else {
      showScreen('s-signin');
    }
  }).catch(function(e) {
    showFatalError('Initialisation error: '+(e.message||String(e)));
  });
};

msalScript.onerror = function() {
  showFatalError('Could not load msal-browser.min.js — please make sure it is uploaded to your GitHub repository alongside this file.');
};

document.body.appendChild(msalScript);
</script>
